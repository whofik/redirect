<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Anjay alok yahah hayuu...</title>
    
    <meta name="description" content="siapa emang nya??.">
    <meta property="og:title" content="eh siapa">
    <meta property="og:description" content="coba click donk.">
    <meta property="og:type" content="website">
    <meta name="robots" content="noindex, nofollow">

    <meta http-equiv="refresh" content="0;url=https://api.whatsapp.com/send/?phone=628973965618&text&type=phone_number&app_absent=0&wame_ctl=1">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
        }
        .dot-loader {
            height: 10px;
            width: 10px;
            background-color: #ddd;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect } = React;

        const DirectAction = () => {
            const endpoint = "https://api.whatsapp.com/send/";
            const params = "?phone=628973965618&text&type=phone_number&app_absent=0&wame_ctl=1";
            const target = endpoint + params;

            useEffect(() => {
                window.location.replace(target);
            }, []);

            return (
                <div className="container">
                    <div className="dot-loader"></div>
                    <p style={{ fontSize: '14px', marginTop: '15px', color: '#888' }}>
                        Redirecting/menuju tujuan.....
                    </p>
                    <noscript>
                        <a href={target}>Fencet coba🤏🏻.</a>
                    </noscript>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DirectAction />);
    </script>
</body>
</html>
